apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: rs-manoj
  namespace: manoj
spec:
  replicas: 3
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
      - name: c1
        image: nginx
      - name: c2
        image: redis
